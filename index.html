<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo Matemático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA INICIAL -->
  <div id="telaInicial">

    <img id="imgInicio" src="inicio.png">

    <button id="btnJogar" onclick="iniciarJogo()">
      JOGAR
    </button>

  </div>


  <!-- JOGO -->
  <div id="game">

    <!-- MAPA -->
    <img id="mapa" src="fundo.png">

    <!-- PERSONAGEM -->
    <img id="player" src="player.png">

    <!-- BALÃO -->
    <div id="balao">
      <img src="balao.png">
      <div id="pergunta">2 + 2</div>
    </div>

    <!-- ALTERNATIVAS -->
    <div id="opcoes">
      <button onclick="responder(0)">3</button>
      <button onclick="responder(1)">4</button>
      <button onclick="responder(2)">5</button>
      <button onclick="responder(3)">6</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
