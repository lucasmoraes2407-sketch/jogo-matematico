<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Aventura Matemática</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL -->
<div id="telaInicial">

  <img id="fundoInicio" src="inicio.png">

  <div id="menuInicial">

    <button id="btnJogar" onclick="iniciarJogo()">
      JOGAR
    </button>

    <button id="btnTutorial" onclick="mostrarTutorial()">
      COMO JOGAR
    </button>

  </div>

</div>

<!-- TELA DO JOGO -->
<div id="game">

  <!-- MAPA -->
  <img id="mapa" src="fundo.png">

  <!-- PERSONAGEM -->
  <img id="player" src="player.png">

  <!-- BALÃO -->
  <div id="balao">
    <img src="balao.png">
    <div id="pergunta">Carregando...</div>
  </div>

  <!-- ALTERNATIVAS -->
  <div id="opcoes">
    <button onclick="responder(0)"></button>
    <button onclick="responder(1)"></button>
    <button onclick="responder(2)"></button>
    <button onclick="responder(3)"></button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
