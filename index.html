<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Matemático</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="telaInicial">

        <img id="capa" src="inicio.png">

        <button id="btnJogar" onclick="iniciarJogo()">
            JOGAR
        </button>

    </div>


    <!-- JOGO -->
    <div id="game">

        <!-- FUNDO -->
        <img id="mapa" src="fundo.png">

        <!-- PERSONAGEM -->
        <img id="player" src="player.png">

        <!-- BALÃO -->
        <div id="balaoContainer">
            <img id="balao" src="balao.png">
            <div id="pergunta">2 + 2</div>
        </div>

        <!-- OPÇÕES -->
        <div id="opcoes">
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
