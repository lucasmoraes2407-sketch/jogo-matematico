<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jogo Matemático</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TELA INICIAL -->
<div id="telaInicial">

  <img id="fundoInicio" src="inicio.png">

  <button id="btnJogar" onclick="iniciarJogo()">
    JOGAR
  </button>

</div>

<!-- TELA DO JOGO -->
<div id="game">

  <img id="mapa" src="fundo.png">

  <img id="player" src="player.png">

  <div id="balao">
    <img src="balao.png">
    <div id="pergunta">Carregando...</div>
  </div>

  <div id="opcoes">
    <button onclick="responder(0)"></button>
    <button onclick="responder(1)"></button>
    <button onclick="responder(2)"></button>
    <button onclick="responder(3)"></button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
